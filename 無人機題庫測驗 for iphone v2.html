<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>無人機專業測驗系統 - 完整功能網頁版</title>
    <style>
        :root { 
            --primary: #bb86fc; --accent: #03dac6; --wrong: #cf6679;
            --star: #ffd700; --bg: #121212; --card-bg: #1e1e1e;
            --text-main: #e0e0e0; --text-dim: #a0a0a0; --battle: #ff9800; 
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", sans-serif;
            background: var(--bg); margin: 0; 
            padding: env(safe-area-inset-top) 15px calc(100px + env(safe-area-inset-bottom)) 15px;
            color: var(--text-main); line-height: 1.6;
            -webkit-text-size-adjust: 100%;
        }
        
        .container { max-width: 850px; margin: 0 auto; }
        
        .header { 
            text-align: center; background: #2c2c2c; padding: 25px; border-radius: 16px; 
            margin: 20px 0; border-bottom: 2px solid var(--primary); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
        }
        .header h1 { margin: 0 0 15px 0; font-size: 1.5em; color: var(--primary); }

        .mode-controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        
        .btn { 
            padding: 16px; font-size: 17px; border-radius: 12px; border: none; font-weight: 600; 
            transition: 0.2s; width: 100%; cursor: pointer;
            -webkit-user-select: none; user-select: none;
            touch-action: manipulation; display: block; text-align: center;
        }
        
        .btn-random { background: var(--accent); color: #000; }
        .btn-battle { background: var(--battle); color: #000; }
        .btn-reset { background: #3d3d3d; color: #bbb; margin-top: 5px; font-size: 14px; }

        /* 固定底部提交列 */
        .fixed-footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(30, 30, 30, 0.95); backdrop-filter: blur(10px);
            padding: 15px 20px calc(15px + env(safe-area-inset-bottom));
            border-top: 1px solid #333; z-index: 9999; display: none;
        }
        .btn-submit { background: var(--accent); color: #000; font-size: 18px; }

        /* 題目卡片與對齊 */
        .question-card { background: var(--card-bg); padding: 20px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #333; display: flex; gap: 12px; }
        .star-box { flex-shrink: 0; display: flex; align-items: center; height: 1.5em; }
        .star-btn { cursor: pointer; font-size: 28px; color: #444; }
        .star-btn.active { color: var(--star); }
        
        .q-number { color: var(--primary); font-weight: bold; display: block; margin-bottom: 5px; }
        .q-text { font-size: 1.1em; margin-bottom: 15px; display: block; }

        .option-label { 
            display: flex; align-items: flex-start; gap: 12px; padding: 16px; 
            border: 1px solid #333; border-radius: 12px; background: #252525; margin-bottom: 8px;
        }
        .option-label input { 
            appearance: none; -webkit-appearance: none; width: 22px; height: 22px;
            border: 2px solid #666; border-radius: 50%; flex-shrink: 0; transform: translateY(3px); 
        }
        .option-label input:checked {
            border-color: var(--accent); background: radial-gradient(var(--accent) 45%, transparent 55%);
        }

        /* 結果分析區 */
        #resultArea { display: none; padding-bottom: 50px; }
        .result-card { background: var(--card-bg); padding: 40px 20px; border-radius: 16px; text-align: center; border: 1px solid #333; margin-bottom: 25px; }
        .report-section { background: var(--card-bg); padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid #333; }
        .report-item { padding: 20px; background: #252525; margin-bottom: 15px; border-radius: 12px; border-left: 6px solid #444; text-align: left; }
        .wrong-border { border-left-color: var(--wrong); }
        .star-border { border-left-color: var(--star); }
        .text-correct { color: var(--accent); font-weight: bold; }
        .text-wrong { color: var(--wrong); font-weight: bold; }

        #starList { display: none; margin-top: 15px; }
        .toggle-btn { background: #333; color: var(--star); border: 1px solid var(--star); margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header" id="mainHeader">
        <h1>無人機專業測驗 (雲端完整版)</h1>
        <div class="mode-controls">
            <button class="btn btn-random" id="randomBtn" onclick="startMode('random')">🎲 隨機練習模式</button>
            <button class="btn btn-battle" id="battleBtn" onclick="startMode('battle')">🔥 戰到最後模式</button>
            <button class="btn btn-reset" onclick="resetProgress()">重置所有進度</button>
        </div>
        <div id="modeStatus" style="color: var(--text-dim); font-weight: bold;">請選擇模式</div>
    </div>

    <div id="quizSection">
        <div id="quizContainer"></div>
    </div>

    <div id="fixedFooter" class="fixed-footer">
        <button class="btn btn-submit" onclick="submitExam()">提交測驗檢視報告</button>
    </div>

    <div id="resultArea">
        <div class="result-card">
            <h2 id="finalScore" style="font-size: 60px; color: var(--primary); margin: 10px 0;">0 分</h2>
            <div id="correctStats" style="font-size: 1.2em; margin-bottom: 10px;">答對：0 / 40</div>
            <div id="progressStats" style="color: var(--battle); font-weight: bold; margin-bottom: 15px;"></div>
            <div id="finalStatus" style="font-size: 20px; font-weight: bold;"></div>
            <button class="btn btn-random" style="margin-top:20px;" onclick="reloadForNextRound()">下一回測驗</button>
        </div>

        <div id="starReportSection" class="report-section" style="display:none;">
            <h3 style="color:var(--star); margin-top:0;">⭐ 重點複習 (已標記題目)</h3>
            <button class="btn toggle-btn" onclick="toggleStarList()">點擊展開 / 隱藏星號題目</button>
            <div id="starList"></div>
        </div>

        <div id="wrongReportSection" class="report-section">
            <h3 style="color:var(--wrong); margin-top:0;">❌ 答錯題目彙整</h3>
            <div id="wrongList"></div>
        </div>
    </div>
</div>

let selectedQuestions = [];
let userAnswers = {};
let starredIds = new Set();
let currentMode = null;

function init() {
    const savedMode = localStorage.getItem('active_mode');
    if (savedMode) startMode(savedMode, true);
}

function startMode(mode, auto = false) {
    currentMode = mode;
    localStorage.setItem('active_mode', mode);
    const progress = JSON.parse(localStorage.getItem('battle_progress') || "[]");
    
    const statusEl = document.getElementById('modeStatus');
    if (mode === 'battle') {
        statusEl.innerText = `🔥 戰到最後進度: ${progress.length}/${fullBank.length}`;
        statusEl.style.color = "var(--battle)";
    } else {
        statusEl.innerText = "🎲 隨機練習模式";
        statusEl.style.color = "var(--accent)";
    }

    document.getElementById('quizSection').style.display = 'block';
    document.getElementById('fixedFooter').style.display = 'block';
    loadQuestions();
    if (!auto) window.scrollTo({ top: 0, behavior: 'smooth' });
}

function loadQuestions() {
    const container = document.getElementById('quizContainer');
    container.innerHTML = "";
    userAnswers = {};
    
    let source = [...fullBank];
    if (currentMode === 'battle') {
        const completed = JSON.parse(localStorage.getItem('battle_progress') || "[]");
        source = fullBank.filter(q => !completed.includes(q.id));
    }
    selectedQuestions = source.sort(() => 0.5 - Math.random()).slice(0, 40);

    selectedQuestions.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'question-card';
        div.innerHTML = `
            <div class="star-box"><div class="star-btn" id="star-${item.id}" onclick="toggleStar(${item.id}, this)">★</div></div>
            <div class="q-content">
                <span class="q-number">第 ${idx + 1} 題 (編號 ${item.id})</span>
                <span class="q-text">${item.q}</span>
                <div class="options">
                    ${item.options.map((opt, i) => {
                        const v = String.fromCharCode(65 + i);
                        return `<label class="option-label"><input type="radio" name="q${item.id}" value="${v}" onchange="userAnswers[${item.id}]='${v}'"><span>${opt}</span></label>`;
                    }).join('')}
                </div>
            </div>`;
        container.appendChild(div);
    });
}

function toggleStar(id, el) {
    el.classList.toggle('active');
    if (el.classList.contains('active')) starredIds.add(id);
    else starredIds.delete(id);
}

function toggleStarList() {
    const list = document.getElementById('starList');
    list.style.display = (list.style.display === 'none') ? 'block' : 'none';
}

// 輔助函式：產生包含原題目與選項的報告 HTML
function generateReportHtml(item, uAns, borderClass) {
    const isCorrect = (uAns === item.a);
    const optsHtml = item.options.map(o => `<div style="margin: 5px 0; opacity: 0.8;">${o}</div>`).join('');
    return `
        <div class="report-item ${borderClass}">
            <div style="font-size:0.85em; color:var(--text-dim); margin-bottom:5px;">題庫編號 ${item.id}</div>
            <div style="font-weight:bold; margin-bottom:12px; font-size:1.1em;">${item.q}</div>
            <div style="background:#1a1a1a; padding:12px; border-radius:8px; font-size:0.95em; margin-bottom:12px;">${optsHtml}</div>
            <div style="font-weight:bold;">
                正確答案：<span class="text-correct">(${item.a})</span> | 您的選擇：<span class="${isCorrect ? 'text-correct' : 'text-wrong'}">(${uAns})</span>
            </div>
        </div>`;
}

function submitExam() {
    if (!confirm("確定提交試卷並檢視詳細分析？")) return;
    
    let correctCount = 0;
    let wrongHtml = "";
    let starHtml = "";

    selectedQuestions.forEach(item => {
        const uAns = userAnswers[item.id] || "未作答";
        const isCorrect = (uAns === item.a);
        
        if (isCorrect) correctCount++;
        else {
            wrongHtml += generateReportHtml(item, uAns, 'wrong-border');
        }

        if (starredIds.has(item.id)) {
            starHtml += generateReportHtml(item, uAns, 'star-border');
        }
    });

    if (currentMode === 'battle') {
        let p = JSON.parse(localStorage.getItem('battle_progress') || "[]");
        selectedQuestions.forEach(q => { if(!p.includes(q.id)) p.push(q.id); });
        localStorage.setItem('battle_progress', JSON.stringify(p));
    }

    // 切換顯示區塊
    document.getElementById('quizSection').style.display = 'none';
    document.getElementById('fixedFooter').style.display = 'none';
    document.getElementById('mainHeader').style.display = 'none';
    document.getElementById('resultArea').style.display = 'block';
    
    document.getElementById('finalScore').innerText = (correctCount * 2.5) + " 分";
    document.getElementById('correctStats').innerText = `答對題數：${correctCount} / 40`;
    
    const status = document.getElementById('finalStatus');
    status.innerText = (correctCount * 2.5) >= 80 ? "及格！通過測驗。" : "不及格，請加強練習。";
    status.style.color = (correctCount * 2.5) >= 80 ? "var(--accent)" : "var(--wrong)";

    // 處理星號與錯題列表顯示
    if (starredIds.size > 0) {
        document.getElementById('starReportSection').style.display = 'block';
        document.getElementById('starList').innerHTML = starHtml;
    }
    document.getElementById('wrongList').innerHTML = wrongHtml || "<p style='text-align:center;'>太神了！全部正確！</p>";
    
    window.scrollTo(0, 0);
}

function resetProgress() {
    if (confirm("將重置所有戰鬥進度與模式記憶，確定嗎？")) { 
        localStorage.removeItem('battle_progress'); 
        localStorage.removeItem('active_mode');
        location.reload(); 
    }
}

function reloadForNextRound() { location.reload(); }

window.onload = init;
